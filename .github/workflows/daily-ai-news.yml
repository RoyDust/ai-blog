name: Daily AI News

on:
  schedule:
    # 09:00 Asia/Shanghai every day.
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: Optional YYYY-MM-DD date override
        required: false
        default: ''
      regenerate:
        description: Force regenerate an existing daily AI news post
        required: false
        type: boolean
        default: false

env:
  PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL || 'http://47.98.167.32' }}

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger protected daily AI news endpoint
        run: |
          set -euo pipefail
          if [ -z "${AI_NEWS_CRON_SECRET}" ]; then
            echo "Missing AI_NEWS_CRON_SECRET secret" >&2
            exit 1
          fi

          status_after="$(date -u -d '5 minutes ago' +"%Y-%m-%dT%H:%M:%SZ")"
          endpoint="${PRODUCTION_BASE_URL%/}/api/cron/ai-news"
          query=()
          if [ -n "${INPUT_DATE}" ]; then
            query+=("date=${INPUT_DATE}")
          fi
          if [ "${INPUT_REGENERATE}" = "true" ]; then
            query+=("regenerate=true")
          fi
          trigger_url="${endpoint}"
          if [ "${#query[@]}" -gt 0 ]; then
            joined="$(IFS='&'; echo "${query[*]}")"
            trigger_url="${trigger_url}?${joined}"
          fi

          echo "Triggering daily AI news endpoint: ${trigger_url}"
          curl --fail-with-body --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${AI_NEWS_CRON_SECRET}" \
            --header "Content-Type: application/json" \
            "$trigger_url"
          echo

          status_query=("${query[@]}" "after=${status_after}")
          status_joined="$(IFS='&'; echo "${status_query[*]}")"
          status_url="${endpoint}?${status_joined}"
          echo "Polling daily AI news status: ${status_url}"

          for attempt in $(seq 1 45); do
            response_file="$(mktemp)"
            http_status="$(curl --show-error --silent \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer ${AI_NEWS_CRON_SECRET}" \
              "$status_url")"
            body="$(cat "$response_file")"
            rm -f "$response_file"

            echo "Daily AI news status attempt ${attempt}: HTTP ${http_status}"
            echo "$body"

            if [ "$http_status" = "200" ]; then
              exit 0
            fi
            if [ "$http_status" != "202" ]; then
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for daily AI news generation to finish" >&2
          exit 1
        env:
          AI_NEWS_CRON_SECRET: ${{ secrets.AI_NEWS_CRON_SECRET }}
          INPUT_DATE: ${{ github.event.inputs.date || '' }}
          INPUT_REGENERATE: ${{ github.event.inputs.regenerate || 'false' }}
